name: Loz CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Setup LLVM and Clang (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm clang build-essential libc6-dev
          echo "LLVM_SYS_181_PREFIX=$(llvm-config --prefix)" >> "$GITHUB_ENV"

      - name: Setup LLVM and Clang (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm
          echo "LLVM_SYS_181_PREFIX=$(brew --prefix llvm)" >> "$GITHUB_ENV"
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

      - name: Run tests
        run: cargo test

  # Windows full LLVM/codegen CI is temporarily disabled because llvm-sys v181
  # requires LLVM 18 with llvm-config, while windows-latest currently exposes
  # LLVM 20 and no reliable LLVM 18 llvm-config path. Windows basic crate tests
  # still run.
  windows-basic:
    name: Windows Basic
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Run non-LLVM crate tests
        run: |
          cargo test -p loz_ast
          cargo test -p loz_lexer
          cargo test -p loz_parser
          cargo test -p loz_semantic

  examples:
    name: Examples (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install native linking dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libc6-dev gcc g++ clang llvm binutils
          clang --version
          gcc --version
          ld --version
          ls -la /usr/lib/x86_64-linux-gnu/libc.so* || true
          ls -la /lib/x86_64-linux-gnu/libc.so* || true
          echo "LLVM_SYS_181_PREFIX=$(llvm-config --prefix)" >> "$GITHUB_ENV"

      - name: Setup LLVM and Clang (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm
          echo "LLVM_SYS_181_PREFIX=$(brew --prefix llvm)" >> "$GITHUB_ENV"
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

      - name: Build Loz
        run: cargo build

      - name: Run examples (Unix)
        if: runner.os != 'Windows'
        run: |
          pwd
          ./target/debug/loz --version
          ./target/debug/loz check examples/hello.loz
          ./target/debug/loz run examples/hello.loz
          ./target/debug/loz check examples/json_schema.loz
          ./target/debug/loz run examples/json_schema.loz
          ./target/debug/loz check examples/tool_basic.loz
          ./target/debug/loz run examples/tool_basic.loz
          ./target/debug/loz check examples/async_task.loz
          ./target/debug/loz check examples/constant_eval.loz
          ./target/debug/loz run examples/constant_eval.loz
          LOZ_LLM_PROVIDER=mock ./target/debug/loz agent run examples/agent_support.loz "hello"
          ./target/debug/loz workflow run examples/workflow_onboarding.loz
          cd examples/package_demo
          ../../target/debug/loz deps
          ../../target/debug/loz check
          ../../target/debug/loz run
          cd ../..

      - name: Configure Ubuntu native library path
        if: runner.os == 'Linux'
        run: |
          echo "LIBRARY_PATH=/usr/lib/x86_64-linux-gnu:/lib/x86_64-linux-gnu" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu:/lib/x86_64-linux-gnu" >> $GITHUB_ENV

      - name: Verify Ubuntu native libc toolchain
        if: runner.os == 'Linux'
        run: |
          echo "=== clang ==="
          clang --version
          echo "=== gcc ==="
          gcc --version
          echo "=== ld ==="
          ld --version
          echo "=== gcc search dirs ==="
          gcc -print-search-dirs
          echo "=== clang search dirs ==="
          clang -print-search-dirs || true
          echo "=== libc candidates ==="
          find /usr/lib /lib -name 'libc.so*' -o -name 'libc.a' | sort || true
          echo "=== expected paths ==="
          ls -la /usr/lib/x86_64-linux-gnu/libc.so* || true
          ls -la /lib/x86_64-linux-gnu/libc.so* || true
          test -e /usr/lib/x86_64-linux-gnu/libc.so || test -e /lib/x86_64-linux-gnu/libc.so || (echo "libc.so development linker file is missing" && exit 1)

      - name: Test native build (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          ./target/debug/loz build examples/hello.loz
          ls -la output
          chmod +x output/hello || true
          ./output/hello

  vscode-extension-check:
    name: VS Code Extension Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate extension JSON
        run: |
          node -e "const fs=require('fs'); for (const f of ['vscode-loz/package.json','vscode-loz/language-configuration.json','vscode-loz/syntaxes/loz.tmLanguage.json','vscode-loz/snippets/loz.json','vscode-loz/icons/loz-icon-theme.json']) JSON.parse(fs.readFileSync(f,'utf8')); console.log('VS Code extension JSON ok');"

      - name: Check extension JavaScript
        run: node --check vscode-loz/src/extension.js
